name: 'Setup GDAL'
description: 'Install GDAL via system package manager, caching the whole Homebrew prefix on macOS'

outputs:
  version:
    description: 'Installed GDAL version (output of `gdal-config --version`)'
    value: ${{ steps.verify.outputs.version }}

runs:
  using: 'composite'
  steps:
    # Cache the installed Homebrew prefix, not just the downloaded bottles.
    # The dominant cost of `brew install gdal` is "pouring" ~70 dependency
    # bottles (aws-sdk-cpp alone is 82k files) into /opt/homebrew — caching
    # the downloads avoids the fetch but not the pour. Caching the whole
    # prefix lets a cache hit skip `brew install` entirely.
    - name: Cache Homebrew GDAL install
      id: gdal-cache
      if: runner.os == 'macOS'
      uses: actions/cache@v5
      with:
        path: /opt/homebrew
        # `ImageOS` is included so a runner-image bump re-installs cleanly
        # instead of restoring a stale prefix.
        key: macos-gdal-prefix-${{ runner.arch }}-${{ env.ImageOS }}-${{ hashFiles('scripts/install-gdal.sh') }}

    - name: Install GDAL
      # Skip on macOS only when the prefix cache was restored — GDAL and all
      # its dependencies are then already poured and linked.
      if: runner.os != 'macOS' || steps.gdal-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        HOMEBREW_NO_AUTO_UPDATE: "1"
      run: ./scripts/install-gdal.sh --testing

    - name: Verify GDAL installation
      id: verify
      shell: bash
      run: |
        version="$(gdal-config --version)"
        echo "GDAL version: $version"
        echo "version=$version" >> "$GITHUB_OUTPUT"
