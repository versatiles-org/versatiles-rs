name: 'Setup GDAL'
description: 'Install GDAL via system package manager, with Homebrew bottle caching on macOS'

outputs:
  version:
    description: 'Installed GDAL version (output of `gdal-config --version`)'
    value: ${{ steps.verify.outputs.version }}

runs:
  using: 'composite'
  steps:
    - name: Cache Homebrew bottle downloads
      if: runner.os == 'macOS'
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/Homebrew/downloads
        key: macos-gdal-bottles-${{ runner.arch }}-${{ hashFiles('scripts/install-gdal.sh') }}
        restore-keys: |
          macos-gdal-bottles-${{ runner.arch }}-

    - name: Install GDAL
      shell: bash
      env:
        HOMEBREW_NO_AUTO_UPDATE: "1"
      run: ./scripts/install-gdal.sh --testing

    - name: Verify GDAL installation
      id: verify
      shell: bash
      run: |
        version="$(gdal-config --version)"
        echo "GDAL version: $version"
        echo "version=$version" >> "$GITHUB_OUTPUT"
